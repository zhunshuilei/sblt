#!/usr/bin/yong-config
#Yong输入法配置文件

[DESC]
#配置文件版本
version=2

[IM]
default=0
0=sl
#1=ld
#2=slb
#3=sbltbz

#候选字个数
cand=3
#简繁转换
#简繁一对多转换
s2t_m=0
#汉字过滤 0:不过滤 1：常用汉字
filter=0
#默认启动
enable=1
#皮肤
skin=skin 0
#回车键行为 clear:清编码 commit:上屏首选 default上屏编码（默认）
enter=default
#数字键行为
num=push
#空格键行为，default半角空格（默认不设置），full全角空格
#space=default
#预编辑模式 0:禁用 1:启用
onspot=1
#预编辑类型 0:候选 1:编码
preedit=0
#自动调频
auto_move=1
#历史记录
#history=history.txt
#小键盘行为 0:默认功能同主键盘 1:不作为编码键，但可以选重 2:出数字
keypad=0
#输入法上屏方式（外挂模式才有效），0默认，1剪贴板，2浮动窗口，3模拟按键
#onput=0
space=default

[main]
#用户的配置文件编辑器
edit=
#显示托盘图标
tray=1
#不显示主窗口
noshow=1
#状态栏半透明
#主窗口位置 0:右下 1:顶部居中 2:左下
pos=0
#是否开启操作反馈
#tip=1

[input]
#编码提示
hint=1
#不使用光标跟随
#不显示输入窗口
noshow=0
#候选显示长度
strip=9
#光标跟随方式，0原方式，1新方式
#a_caret=1
font=Noto Sans CJK SC Heavy 10

[key]
#打开输入法
trigger=CTRL_SPACE
#二三重码选择
#select=LSHIFT RSHIFT
#中英文切换
CNen=LSHIFT RSHIFT
#临时英语模式
tEN=NONE
#切换输入法
switch=CTRL_LSHIFT
#翻页
page=- =
#以词定字
w2c=[ ]
#汉字过滤
filter=\\
#调词频
move=CTRL_UP CTRL_DOWN
#显示输入条
ishow=`
#一键切换到输入法
switch_default=CTRL_`
#笔画引导
bihua=`
#增词
add=ALT_=
#删词
del=ALT_-
#繁簡轉換
s2t=CTRL_SHIFT_F
#编码查询
query=CTRL_/
#中英文标点切换的快捷键
#biaodian=CTRL_.

[ld]
name=蓝单
engine=libmb.so
arg=mb/sbltdz.txt
overlay=mb/ld/ld.ini
corner=half
biaodian=en
#tip_exist=1
tip_simple=1
thread=1
beep=none

[sl]
name=声蓝
engine=libmb.so
arg=mb/sblt.txt
overlay=mb/sl/sl.ini
corner=half
biaodian=en
#auto_phrase=3,9,0
#tip_exist=1
#tip_simple=1
thread=1
#assist_series=1

[slb]
name=蓝顶
engine=libmb.so
arg=mb/sbltb.txt
overlay=mb/slb/slb.ini
corner=half
#tip_exist=1
#tip_simple=1
aotu_phrase=2,9,0
thread=1
#assist_series=1
#assist=mb/sbltqm.txt 2
#dicts=mb/fuhao.txt mb/sbltdz.txt
#bihua=hspdz
beep=none

[sbltbz]
name=蓝天
engine=libmb.so
arg=mb/pinyin.txt
overlay=mb/pinyin.ini
sp=sblt
fuzzy=fuzzy.txt
dicts=mb/sbltdz.txt mb/fuhao.txt
assist_series=1
assist=mb/sbltqm.txt 2
bihua=hspdz
corner=half

[sync]
